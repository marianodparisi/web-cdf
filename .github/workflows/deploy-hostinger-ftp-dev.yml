name: Deploy Astro to Hostinger Dev (FTP)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lockfile=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies (npm ci)
        if: steps.lockfile.outputs.has_lockfile == 'true'
        run: npm ci

      - name: Install dependencies (npm install)
        if: steps.lockfile.outputs.has_lockfile != 'true'
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Deploy to Hostinger Dev via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEV_FTP_SERVER }}
          username: ${{ secrets.DEV_FTP_USERNAME }}
          password: ${{ secrets.DEV_FTP_PASSWORD }}
          server-dir: ${{ secrets.DEV_FTP_SERVER_DIR }}
          local-dir: ./dist/
